<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ blogname }}</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", sans-serif; color: #172033; line-height: 1.7; background: #f7f8fb; }
    .container { width: min(1080px, calc(100% - 40px)); margin: 0 auto; }
    .hero { padding: 96px 0 80px; background: linear-gradient(135deg, #eef4ff 0%, #fff 100%); text-align: center; }
    .hero h1 { font-size: clamp(32px, 5vw, 52px); margin: 0 0 16px; letter-spacing: -.03em; }
    .hero p { font-size: 18px; color: #667085; margin: 0 0 28px; }
    .button { display: inline-block; background: #1b64da; color: #fff; border-radius: 999px; padding: 12px 24px; text-decoration: none; font-weight: 700; }
    section { padding: 64px 0; }
    .features { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
    .feature { background: #fff; border: 1px solid #e4e7ec; border-radius: 16px; padding: 24px; }
    .feature h3 { margin: 0 0 8px; }
    .feature p { margin: 0; color: #667085; }
    footer { background: #111827; color: #d1d5db; padding: 28px 0; text-align: center; font-size: 14px; }
    @media (max-width: 760px) { .features { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <section class="hero">
    <div class="container">
      <h1>{{ blogname }}</h1>
      <p>{{ blogdescription }}</p>
      <a class="button" href="#features">詳しく見る</a>
    </div>
  </section>

  <section id="features">
    <div class="container">
      <div class="features">
        <div class="feature">
          <h3>スピード</h3>
          <p>単一バイナリで軽快に動作します。</p>
        </div>
        <div class="feature">
          <h3>シンプル</h3>
          <p>ブラウザから手軽にコンテンツを更新できます。</p>
        </div>
        <div class="feature">
          <h3>拡張性</h3>
          <p>テンプレートを自由に編集してデザインを差し替えられます。</p>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <div class="container">&copy; 2026 {{ blogname }}</div>
  </footer>
</body>
</html>
