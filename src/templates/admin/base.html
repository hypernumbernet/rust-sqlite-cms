<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}管理画面{% endblock %} - rust-sqlite-cms</title>
  <style>
    :root {
      --bg: #f1f1f1;
      --panel: #ffffff;
      --sidebar: #1d2327;
      --sidebar-hover: #2c3338;
      --accent: #2271b1;
      --text: #1d2327;
      --muted: #646970;
      --border: #dcdcde;
      --placeholder: #9ca3af76;
      --admin-sidebar-width: 220px;
      --admin-break-narrow: 860px;
      --admin-break-wide: 1080px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: var(--admin-sidebar-width);
      background: var(--sidebar);
      color: #f0f0f1;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }
    .sidebar .brand {
      padding: 18px 20px;
      font-weight: 700;
      font-size: 15px;
      border-bottom: 1px solid var(--sidebar-hover);
      letter-spacing: .02em;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
    }
    .sidebar .brand-version {
      font-size: 11px;
      font-weight: 400;
      color: #8c8f94;
      letter-spacing: 0;
    }
    .sidebar nav { padding: 8px 0; }
    .sidebar nav a {
      display: block;
      padding: 11px 20px;
      color: #c3c4c7;
      text-decoration: none;
      font-size: 14px;
    }
    .sidebar nav a:hover { background: var(--sidebar-hover); color: #fff; }
    .sidebar nav a.active { background: var(--accent); color: #fff; }
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .topbar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    .topbar h1 { margin: 0; font-size: 18px; }
    .topbar .user { color: var(--muted); font-size: 13px; }
    .topbar .user-form {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0;
    }
    .topbar .logout-btn {
      padding: 6px 12px;
      font-size: 13px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      cursor: pointer;
    }
    .topbar .logout-btn:hover { background: var(--bg); }
    .content { padding: 24px; overflow-x: auto; }
    a { color: var(--accent); }

    /* ========== Common admin UI components (shared by all pages) ========== */
    .breadcrumb { margin: 0 0 16px; font-size: 13px; color: var(--muted); }
    .breadcrumb a { text-decoration: none; }

    .form-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      align-items: start;
    }
    .form-layout > * {
      min-width: 0;
    }
    @media (min-width: 860px) {
      body.embed-mode .form-layout {
        grid-template-columns: minmax(0, 1fr) minmax(240px, 280px);
      }
    }
    @media (min-width: 1080px) {
      .form-layout {
        grid-template-columns: minmax(0, 1fr) minmax(240px, 280px);
      }
    }
    .placeholder-form-layout {
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: stretch;
    }
    .placeholder-form-layout > .panel {
      min-width: 0;
      width: 100%;
      box-sizing: border-box;
    }
    @media (min-width: 860px) {
      body.embed-mode .placeholder-form-layout {
        display: grid;
        grid-template-columns: minmax(280px, 400px) minmax(0, 1fr);
        align-items: start;
      }
      body.embed-mode .placeholder-form-layout > .placeholder-form-inputs {
        max-width: 400px;
      }
      body.embed-mode .placeholder-form-layout > .placeholder-form-guide {
        min-width: 0;
      }
    }
    @media (min-width: 1080px) {
      .placeholder-form-layout {
        display: grid;
        grid-template-columns: minmax(280px, 400px) minmax(0, 1fr);
        align-items: start;
      }
      .placeholder-form-layout > .placeholder-form-inputs {
        max-width: 400px;
      }
      .placeholder-form-layout > .placeholder-form-guide {
        min-width: 0;
      }
    }
    .placeholder-example-label {
      margin: 0 0 8px;
      font-size: 13px;
      color: var(--text);
    }
    .placeholder-example-label strong { font-weight: 600; }
    .placeholder-example {
      margin: 0;
      padding: 12px;
      background: #f6f7f7;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      overflow-x: auto;
      max-width: 100%;
      word-break: break-word;
    }
    .dynamic-config-fields {
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px;
      background: #fafafa;
      margin-bottom: 8px;
    }
    .config-json-details { margin-top: 4px; }
    .config-json-details summary {
      cursor: pointer;
      font-size: 12px;
      color: var(--muted);
    }
    .config-json-raw {
      font-family: ui-monospace, monospace;
      font-size: 12px;
      width: 100%;
      margin-top: 6px;
    }
    .placeholder-delete-form { margin: 18px 0 0; }
    .panel {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px;
    }
    .field { margin-bottom: 18px; }
    .field:last-child { margin-bottom: 0; }
    label { display: block; margin-bottom: 6px; font-weight: 600; }

    input[type="text"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 9px 10px;
      font: inherit;
      background: #fff;
    }
    input::placeholder,
    textarea::placeholder {
      color: var(--placeholder);
      opacity: 1;
    }

    .help { margin: 6px 0 0; color: var(--muted); font-size: 12px; overflow-wrap: break-word; }
    .help code { font-size: 11px; }
    .actions { display: flex; gap: 10px; align-items: center; margin-top: 18px; flex-wrap: wrap; }

    .button {
      display: inline-block;
      border: 1px solid var(--accent);
      border-radius: 4px;
      background: var(--accent);
      color: #fff;
      padding: 9px 14px;
      text-decoration: none;
      font: inherit;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
    }
    .button.secondary { background: #fff; color: var(--accent); }
    .button.danger { background: #fff; color: #b32d2e; border-color: #b32d2e; }

    .toolbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 16px;
    }
    .toolbar p { margin: 0; color: var(--muted); flex: 1 1 200px; }

    .tab-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      margin: 0 0 20px;
      border-bottom: 1px solid var(--border);
    }
    .tab-nav a {
      display: inline-block;
      padding: 10px 18px;
      text-decoration: none;
      color: var(--muted);
      font-size: 14px;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .tab-nav a.active {
      color: var(--text);
      font-weight: 600;
      border-bottom-color: var(--accent);
    }
    .tab-panel[hidden] { display: none; }

    table { width: 100%; border-collapse: collapse; }
    th, td {
      border-bottom: 1px solid var(--border);
      padding: 12px 14px;
      text-align: left;
      vertical-align: middle;
      font-size: 14px;
    }
    th { background: #f6f7f7; color: var(--muted); font-weight: 600; }
    tr:last-child td { border-bottom: 0; }

    .empty { padding: 28px; color: var(--muted); }

    .panel.panel-table {
      padding: 0;
      overflow-x: auto;
    }
    .panel-table table { min-width: 640px; }
    .panel-table td { vertical-align: top; }
    .panel-table th:last-child,
    .panel-table td:last-child { white-space: nowrap; }

    .op-actions {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }
    .op-actions form { margin: 0; display: inline; }

    .post-title { font-weight: 600; margin-bottom: 4px; }
    .post-meta { color: var(--muted); font-size: 12px; }
    .placeholder-name {
      font-weight: 600;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
    }
    .meta-line { margin: 0 0 16px; color: var(--muted); font-size: 13px; }

    .notice {
      border-radius: 4px;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 14px;
      overflow-wrap: break-word;
    }
    .notice.error { background: #fcf0f1; border: 1px solid #d63638; color: #8a1f1f; }
    .notice.success { background: #edfaef; border: 1px solid #1b8a4b; color: #1b5e20; }
    .notice.info {
      background: #f0f6fc;
      border: 1px solid #c5d9ed;
      color: var(--text);
      font-size: 13px;
      padding: 12px 14px;
      margin-bottom: 18px;
    }

    .code-editor {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre;
      resize: vertical;
      box-sizing: border-box;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fafafa;
    }
    .code-editor--page { min-height: 420px; }
    .code-editor--tall { min-height: 520px; }
    .code-editor--short { min-height: 220px; font-size: 12px; }

    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 12px;
    }
    .media-option {
      border: 2px solid var(--border);
      border-radius: 4px;
      padding: 8px;
      cursor: pointer;
      text-align: center;
    }
    .media-option:has(input:checked) { border-color: var(--accent); }
    .media-option input { margin: 0 0 8px; }
    .media-option img {
      width: 100%;
      height: 80px;
      object-fit: cover;
      border-radius: 4px;
      display: block;
      margin-bottom: 6px;
    }
    .media-option span {
      display: block;
      font-size: 11px;
      color: var(--muted);
      word-break: break-all;
    }
    .empty-media {
      padding: 16px;
      background: #f6f7f7;
      border-radius: 4px;
      color: var(--muted);
      font-size: 14px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }
    .card-grid--wide {
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    }

    .field-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .field-row .field { flex: 1; min-width: 140px; }

    .vars-help {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
      font-size: 12.5px;
      line-height: 1.6;
      margin-top: 8px;
    }
    .vars-help code {
      background: #fff;
      padding: 1px 4px;
      border-radius: 3px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .delete-form { margin: 18px 0 0; }

    .mt-16 { margin-top: 16px; }
    .mt-20 { margin-top: 20px; }
    .mt-32 { margin-top: 32px; }
    .mb-0 { margin-bottom: 0; }
    .mb-8 { margin-bottom: 8px; }
    .mb-12 { margin-bottom: 12px; }
    .ml-12 { margin-left: 12px; }
    .panel-spaced { margin-bottom: 20px; }
    .panel-title { margin: 0 0 12px; font-size: 15px; }
    .text-emphasis-danger { color: #b32d2e; font-weight: 600; }
    .text-muted { font-size: 13px; color: var(--muted); }
    .list-muted { color: var(--muted); margin: 0; padding-left: 1.25em; }
    .label-option {
      font-weight: normal;
      display: block;
      margin-top: 6px;
    }
    .label-option + .label-option { margin-top: 4px; }
    .field-label-muted { font-weight: 400; color: var(--muted); }
    .input-mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      max-width: 320px;
    }
    .help-mt-8 { margin-top: 8px; }
    .help-mt-6 { margin-top: 6px; }

    .success {
      background: #edfaef;
      border: 1px solid #b8e6bf;
      border-radius: 4px;
      padding: 12px 14px;
      font-size: 13px;
      margin-bottom: 18px;
    }
    .error {
      background: #fcf0f1;
      border: 1px solid #f0b8bd;
      border-radius: 4px;
      padding: 12px 14px;
      font-size: 13px;
      margin-bottom: 18px;
    }

    .readonly {
      margin: 0;
      padding: 9px 10px;
      background: #f6f7f7;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-weight: 600;
    }

    .checkbox { display: flex; align-items: center; gap: 8px; }
    .checkbox label { margin: 0; }

    .kind,
    .status {
      display: inline-block;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px 9px;
      font-size: 12px;
      color: var(--muted);
    }
    .status.published { border-color: #1b8a4b; color: #1b8a4b; }
    {% if layout.embed %}
    body.embed-mode .layout { display: block; min-height: auto; }
    body.embed-mode .content { padding: 16px; }
    body.embed-mode .breadcrumb a[href="/admin/posts"]:first-child { display: none; }
    {% endif %}
  </style>
</head>
<body{% if layout.embed %} class="embed-mode"{% endif %}>
  <div class="layout">
    {% if !layout.embed %}
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-title">rust-sqlite-cms</span>
        <span class="brand-version">v{{ layout.app_version }}</span>
      </div>
      <nav>
        <a href="/admin" class="{% block nav_dashboard %}{% endblock %}">ダッシュボード</a>
        <a href="/admin/posts" class="{% block nav_posts %}{% endblock %}">投稿</a>
        <a href="/admin/pages" class="{% block nav_pages %}{% endblock %}">ページ</a>
        <a href="/admin/layouts" class="{% block nav_layouts %}{% endblock %}">レイアウト</a>
        <a href="/admin/widgets" class="{% block nav_widgets %}{% endblock %}">ウィジェット</a>
        <a href="/admin/media" class="{% block nav_media %}{% endblock %}">メディア</a>
        <a href="/admin/samples" class="{% block nav_samples %}{% endblock %}">サンプル</a>
        <a href="/admin/users" class="{% block nav_users %}{% endblock %}">ユーザー</a>
        <a href="/admin/settings" class="{% block nav_settings %}{% endblock %}">設定</a>
      </nav>
    </aside>
    {% endif %}
    <div class="main">
      {% if !layout.embed %}
      <header class="topbar">
        <h1>{% block heading %}管理画面{% endblock %}</h1>
        <form method="post" action="/admin/logout" class="user-form">
          <span class="user">{{ layout.user_display_name }} さん</span>
          <button type="submit" class="logout-btn">ログアウト</button>
        </form>
      </header>
      {% endif %}
      <main class="content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>
</body>
</html>
