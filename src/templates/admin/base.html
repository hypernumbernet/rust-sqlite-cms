<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}管理画面{% endblock %} - rust-sqlite-cms</title>
  <style>
    :root {
      --bg: #f1f1f1;
      --panel: #ffffff;
      --sidebar: #1d2327;
      --sidebar-hover: #2c3338;
      --accent: #2271b1;
      --text: #1d2327;
      --muted: #646970;
      --border: #dcdcde;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 220px;
      background: var(--sidebar);
      color: #f0f0f1;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }
    .sidebar .brand {
      padding: 18px 20px;
      font-weight: 700;
      font-size: 15px;
      border-bottom: 1px solid var(--sidebar-hover);
      letter-spacing: .02em;
    }
    .sidebar nav { padding: 8px 0; }
    .sidebar nav a {
      display: block;
      padding: 11px 20px;
      color: #c3c4c7;
      text-decoration: none;
      font-size: 14px;
    }
    .sidebar nav a:hover { background: var(--sidebar-hover); color: #fff; }
    .sidebar nav a.active { background: var(--accent); color: #fff; }
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .topbar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar h1 { margin: 0; font-size: 18px; }
    .topbar .user { color: var(--muted); font-size: 13px; }
    .content { padding: 24px; }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">rust-sqlite-cms</div>
      <nav>
        <a href="/admin" class="{% block nav_dashboard %}{% endblock %}">ダッシュボード</a>
        <a href="/admin/posts" class="{% block nav_posts %}{% endblock %}">投稿</a>
        <a href="/admin/pages">固定ページ</a>
        <a href="/admin/media">メディア</a>
        <a href="/admin/comments">コメント</a>
        <a href="/admin/users">ユーザー</a>
        <a href="/admin/settings">設定</a>
      </nav>
    </aside>
    <div class="main">
      <header class="topbar">
        <h1>{% block heading %}管理画面{% endblock %}</h1>
        <span class="user">ようこそ</span>
      </header>
      <main class="content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>
</body>
</html>
