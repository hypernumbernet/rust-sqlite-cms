<div class="field">
  <label for="name">プレースホルダー名</label>
  <input id="name" name="name" type="text" value="{{ name }}" required pattern="[A-Za-z_][A-Za-z0-9_]*">
  <p class="help">英字またはアンダースコアで始まる識別子（例: <code>news</code>）。</p>
</div>

<div class="field">
  <label for="widget_type_id">ウィジェットタイプ</label>
  <select id="widget_type_id" name="widget_type_id" required>
    {% for widget_type in widget_types %}
    <option value="{{ widget_type.id }}"{% if widget_type.selected %} selected{% endif %}>{{ widget_type.label }}</option>
    {% endfor %}
  </select>
  <p class="help">ウィジェットの見た目（HTML）は <a href="/admin/widgets">ウィジェット</a> 画面で編集します。</p>
</div>
