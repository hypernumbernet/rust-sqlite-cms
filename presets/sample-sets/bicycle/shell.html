<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ blogname }}{% endblock %}</title>
  {% if favicon_url %}<link rel="icon" href="{{ favicon_url }}">{% endif %}
  <link rel="stylesheet" href="/static/bicycle/site.css">
</head>
<body>
  <header>
    <div class="container nav">
      <div class="brand">{{ blogname }}</div>
      <nav class="nav-links" aria-label="主要ナビゲーション">
        <a href="/bicycle">ホーム</a>
        <a href="/bicycle/about">店舗紹介</a>
        <a href="/bicycle/news">お知らせ</a>
        <a href="/bicycle/contact">お問い合わせ</a>
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <div class="container">
      <span>{{ blogname }}</span>
      <span>&copy; 2026 まちのじてんしゃ屋 ペダルス</span>
    </div>
  </footer>
</body>
</html>
