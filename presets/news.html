<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>お知らせ - {{ blogname }}</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", sans-serif; color: #172033; line-height: 1.7; background: #f7f8fb; }
    .container { width: min(820px, calc(100% - 40px)); margin: 0 auto; padding: 56px 0; }
    h1 { font-size: 30px; letter-spacing: -.02em; margin: 0 0 4px; }
    .lead { color: #667085; margin: 0 0 32px; }
    .news-list { background: #fff; border: 1px solid #e4e7ec; border-radius: 16px; padding: 8px 24px; }
    .news-item { display: grid; grid-template-columns: 150px 1fr; gap: 16px; padding: 18px 0; border-bottom: 1px solid #e4e7ec; }
    .news-item:last-child { border-bottom: 0; }
    .news-date { color: #667085; font-size: 13px; }
    .news-title { font-weight: 700; margin: 0 0 4px; }
    .news-excerpt { margin: 0; color: #667085; }
    .empty { color: #667085; padding: 24px 0; }
    @media (max-width: 640px) { .news-item { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>お知らせ</h1>
    <p class="lead">{{ blogname }} からの最新情報</p>
    {# お知らせ一覧はウィジェットタイプ「news」の html_template から生成されます #}
    {{ news_html | safe }}
  </div>
</body>
</html>
