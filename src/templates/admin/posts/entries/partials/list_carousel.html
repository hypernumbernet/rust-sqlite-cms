<section class="panel panel-table">
  {% if has_entries %}
  <table>
    <thead>
      <tr>
        <th>画像</th>
        <th>alt テキスト</th>
        <th>状態</th>
        <th>更新日</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody>
      {% for entry in carousel_entries %}
      <tr>
        <td>
          {% if entry.has_thumbnail %}
          <img class="thumb" src="{{ entry.thumbnail_url }}" alt="{{ entry.alt }}">
          {% else %}
          <div class="thumb-empty">なし</div>
          {% endif %}
        </td>
        <td>{{ entry.alt }}</td>
        <td><span class="status">{{ entry.status_label }}</span></td>
        <td>{{ entry.updated_at }}</td>
        <td>
          <div class="op-actions">
            <a class="button secondary" href="/admin/posts/placeholders/{{ placeholder_id }}/entries/{{ entry.id }}/edit{{ layout.embed_query }}">編集</a>
            <form method="post" action="/admin/posts/placeholders/{{ placeholder_id }}/entries/{{ entry.id }}/delete{{ layout.embed_query }}" onsubmit="return confirm('このスライドをゴミ箱に移動します。よろしいですか？');">
              <button class="button danger" type="submit">削除</button>
            </form>
          </div>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  {% else %}
  <div class="empty">
    まだスライドがありません。「スライドを追加」から画像を登録してください。
  </div>
  {% endif %}
</section>
