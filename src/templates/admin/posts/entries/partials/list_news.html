<section class="panel">
  {% if has_entries %}
  <table>
    <thead>
      <tr>
        <th>タイトル</th>
        <th>状態</th>
        <th>表示日</th>
        <th>更新日</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody>
      {% for entry in entries %}
      <tr>
        <td>
          <div class="post-title">{{ entry.title }}</div>
          <div class="post-meta">slug: {{ entry.post_name }}</div>
        </td>
        <td><span class="status">{{ entry.status_label }}</span></td>
        <td>{{ entry.display_date }}</td>
        <td>{{ entry.updated_at }}</td>
        <td>
          <div class="op-actions">
            <a class="button secondary" href="/admin/posts/placeholders/{{ placeholder_id }}/entries/{{ entry.id }}/edit">編集</a>
            <form method="post" action="/admin/posts/placeholders/{{ placeholder_id }}/entries/{{ entry.id }}/delete" onsubmit="return confirm('この投稿を削除しますか？');">
              <button class="button danger" type="submit">削除</button>
            </form>
          </div>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  {% else %}
  <div class="empty">
    まだ投稿はありません。「新規追加」から最初の投稿を作成してください。
  </div>
  {% endif %}
</section>
