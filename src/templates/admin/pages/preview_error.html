<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>プレビューエラー - rust-sqlite-cms</title>
  <style>
    :root {
      --bg: #f6f7f7;
      --panel: #fff;
      --border: #dcdcde;
      --text: #1d2327;
      --muted: #646970;
      --danger: #b32d2e;
      --accent: #2271b1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap { max-width: 960px; margin: 0 auto; padding: 24px 20px 40px; }
    h1 { margin: 0 0 8px; font-size: 22px; color: var(--danger); }
    .meta { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px 18px;
      margin-bottom: 16px;
    }
    .panel h2 { margin: 0 0 10px; font-size: 15px; }
    pre {
      margin: 0;
      padding: 12px 14px;
      background: #f0f0f1;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow-x: auto;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    a { color: var(--accent); }
    dl { margin: 0; display: grid; grid-template-columns: 120px 1fr; gap: 8px 12px; font-size: 14px; }
    dt { color: var(--muted); margin: 0; }
    dd { margin: 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>プレビューエラー</h1>
    <p class="meta">HTTP {{ status_code }} {{ status_label }} — 開発者向けの詳細を表示しています</p>

    {% if has_page %}
    <section class="panel">
      <h2>対象ページ</h2>
      <dl>
        <dt>ID</dt><dd>{{ page_id }}</dd>
        <dt>名前</dt><dd>{{ page_name }}</dd>
        <dt>ファイル</dt><dd>{{ file_name }}</dd>
      </dl>
    </section>
    {% endif %}

    <section class="panel">
      <h2>概要</h2>
      <pre>{{ summary }}</pre>
    </section>

    <section class="panel">
      <h2>詳細（Debug）</h2>
      <pre>{{ detail }}</pre>
    </section>

    <p><a href="/admin/pages">ページ一覧に戻る</a></p>
  </div>
</body>
</html>
