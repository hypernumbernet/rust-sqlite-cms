<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ blogname }}</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", sans-serif; color: #172033; line-height: 1.8; background: #fff; }
    .container { width: min(720px, calc(100% - 40px)); margin: 0 auto; padding: 64px 0; }
    h1 { font-size: 32px; letter-spacing: -.02em; margin: 0 0 8px; }
    .lead { color: #667085; margin: 0 0 40px; }
    article p { margin: 0 0 18px; }
    hr { border: 0; border-top: 1px solid #e4e7ec; margin: 40px 0; }
    .muted { color: #667085; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>{{ blogname }}</h1>
    <p class="lead">{{ blogdescription }}</p>
    <article>
      <p>ここに本文を記述します。このテンプレートは見出しと本文だけのシンプルな固定ページ向けデザインです。</p>
      <p>テキストを書き換えて、会社概要やプライバシーポリシーなどのページとして利用できます。</p>
    </article>
    <hr>
    <p class="muted">&copy; 2026 {{ blogname }}</p>
  </div>
</body>
</html>
